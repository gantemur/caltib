site_name: caltib
site_description: High-Precision Tibetan Calendrical Math
repo_url: https://github.com/gantemur/caltib
repo_name: gantemur/caltib
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections

extra_css:
  - stylesheets/extra.css

copyright: |
  <style>
    .footer-container {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: 20px;
      row-gap: 8px;
    }
    .footer-affiliations {
      opacity: 0.6;
      font-size: 0.9em;
      text-align: left;
    }
    @media (min-width: 768px) {
      .footer-affiliations {
        margin-left: auto;
        text-align: right;
      }
    }
  </style>
  <div class="footer-container">
    <span>Developed by <strong>Tsogtgerel Gantumur</strong></span>
    <span style="opacity: 0.8;">&copy; 2026. Released under the MIT License.</span>
    <div class="footer-affiliations">
      McGill University &bull; National University of Mongolia &bull; Mongolian Academy of Sciences
    </div>
  </div>

markdown_extensions:
  - attr_list          
  - md_in_html
  - admonition         
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 4               
            show_signature_annotations: true
            separate_signature: true       
            docstring_section_style: list  
            show_if_no_docstring: true
            show_submodules: true
            filters:
              - "!^_"              
              - "!^[A-Z0-9_]+$"    

nav:
  - Home: index.md
  - Traditions & Drift: traditions.md
  - The Reforms: reforms.md
  - Architecture: library.md
  - Design & Diagnostics: tools.md
  - API Reference: api.md
  - 🚀 Live Web Calendar: app.html
  - 📊 Diagnostics Lab: diag.html